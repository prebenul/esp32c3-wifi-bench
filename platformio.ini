[env:esp32-c3-supermini]
platform = espressif32
board = esp32-c3-devkitm-1
framework = arduino
board_build.mcu = esp32c3
board_build.f_cpu = 160000000L

monitor_speed = 115200
upload_speed = 921600

lib_deps =
  AsyncTCP@^3.3.2
  ESP Async WebServer@^3.7.6
  ArduinoJson@^7.4.1

build_flags =
  -DCORE_DEBUG_LEVEL=0
  -DBOARD_HAS_PSRAM=0
  -std=gnu++17
  ; -DWIFI_SSID=\"YourSSID\"
  ; -DWIFI_PASS=\"YourPassword\"

board_build.filesystem = littlefs
extra_scripts = pre:scripts/generate_index.py
